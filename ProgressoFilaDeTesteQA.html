<style>
  :root{
    --bg:#faf9f6;
    --card:#ffffff;
    --border:#e4e1d8;
    --text:#22201b;
    --muted:#75726a;
    --alt-pend:#854f0b;
    --alt-pend-bg:#faeeda;
    --accent:#185fa5;
    --purple:#7c5cff;
    --purple-bg:#efeaff;
    --yellow:#8a6d0a;
    --yellow-bg:#fbf1cf;
  }
  body.dark{
    --bg:#17181a;
    --card:#212226;
    --border:#34363b;
    --text:#eceae5;
    --muted:#9a978f;
    --alt-pend:#e0aa5b;
    --alt-pend-bg:#3a2f18;
    --accent:#5b9fe0;
    --purple:#a78bfa;
    --purple-bg:#2c2445;
    --yellow:#e5c95b;
    --yellow-bg:#3a331a;
  }
  .theme-toggle{
    border:1px solid var(--border);background:var(--card);border-radius:20px;
    padding:6px 14px;font-size:13px;cursor:pointer;color:var(--text);
  }
  .theme-toggle:hover{background:var(--bg);}

  body.dark select.status-select.st-pendente{background:#2c2d31;color:#c7c4bb;}
  body.dark select.status-select.st-baixado{background:#173d31;color:#6fd9b0;}
  body.dark select.status-select.st-recusado{background:#3d1f1f;color:#e58888;}
  body.dark select.situacao-select.sit-padrao{background:#173d31;color:#6fd9b0;}
  body.dark select.situacao-select.sit-comprogramador{background:#3d1f1f;color:#e58888;}
  body.dark select.situacao-select.sit-buildando{background:#1c3550;color:#8fc0ef;}
  body.dark select.situacao-select.sit-esperando{background:#3a331a;color:#e5c95b;}
  body.dark .badge[style*="e6f1fb"]{background:#1c3550 !important;color:#8fc0ef !important;}
  .btn-filtrar{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
  .btn-filtrar:hover{background:#134a80;}

  select.situacao-select{
    border:1px solid var(--border);border-radius:6px;padding:4px 6px;font-size:12px;
    font-weight:500;cursor:pointer;background:var(--card);
  }
  select.situacao-select.sit-padrao{background:#e1f5ee;color:#0f6e56;}
  select.situacao-select.sit-comprogramador{background:#fcebeb;color:#a32d2d;}
  select.situacao-select.sit-buildando{background:#e6f1fb;color:#0c447c;}
  select.situacao-select.sit-esperando{background:var(--yellow-bg);color:var(--yellow);}

  /* Os cards de resumo do Histórico ficam sempre com fundo branco, mesmo no modo escuro */
  body.dark .hist-card{background:#ffffff;}
  body.dark .hist-card .name{color:#22201b;}
  body.dark .hist-card .row{color:#75726a;}
  body.dark .hist-card .row b{color:#22201b;}
  body.dark input, body.dark select{background:var(--card);color:var(--text);border-color:var(--border);}
  body.dark .voltar-btn{color:var(--accent);}
  body.dark .error-box{background:#3d1f1f;color:#e58888;border-color:#5a2c2c;}
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);
    color:var(--text);
    padding:24px;
  }
  h1{font-size:20px;font-weight:600;margin:0 0 4px;}
  .sub{color:var(--muted);font-size:13px;margin:0 0 4px;}
  .conn{font-size:12px;margin:0 0 14px;}
  .conn.ok{color:#0f6e56;}
  .conn.fail{color:#a32d2d;}

  .topnav{display:flex;gap:8px;margin-bottom:18px;}
  .topnav button{
    border:1px solid var(--border);background:var(--card);border-radius:8px;
    padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);
  }
  .topnav button.active{background:var(--text);border-color:var(--text);color:var(--bg);}

  .tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;border-bottom:1px solid var(--border);padding-bottom:12px;}
  .tab-btn{
    border:1px solid var(--border);background:var(--card);border-radius:20px;
    padding:6px 14px;font-size:13px;cursor:pointer;color:var(--muted);font-weight:500;
  }
  .tab-btn:hover{background:var(--bg);}
  .tab-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}

  .cards{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:20px;}
  .metric{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;position:relative;}
  .metric .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;}
  .metric .value{font-size:22px;font-weight:600;margin-top:2px;}
  .metric.clickable{cursor:pointer;}
  .metric.clickable:hover{border-color:var(--accent);}
  .progress-menu{
    position:absolute;top:calc(100% + 6px);left:0;background:var(--card);border:1px solid var(--border);
    border-radius:10px;box-shadow:0 6px 18px rgba(0,0,0,0.08);padding:8px;z-index:20;width:230px;
    display:none;
  }
  .progress-menu.open{display:block;}
  .progress-menu .opt{
    display:flex;align-items:center;gap:8px;padding:8px;border-radius:6px;font-size:12px;cursor:pointer;
  }
  .progress-menu .opt:hover{background:#f2f0ea;}
  .progress-menu .opt.selected{background:var(--purple-bg);color:var(--purple);font-weight:600;}

  .panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px;}
  .panel h2{font-size:14px;font-weight:600;margin:0 0 12px;}
  canvas{max-height:220px;}
  #barChart{max-height:280px;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;font-size:11px;color:var(--muted);text-transform:uppercase;padding:6px 8px;border-bottom:1px solid var(--border);}
  td{padding:7px 8px;border-bottom:1px solid var(--border);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  .badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:6px;font-weight:500;}
  select.status-select{
    border:1px solid var(--border);border-radius:6px;padding:4px 6px;font-size:12px;
    font-weight:500;cursor:pointer;background:var(--card);
  }
  select.status-select.st-pendente{background:#f1efe8;color:#5f5e5a;}
  select.status-select.st-testando{background:var(--yellow-bg);color:var(--yellow);}
  select.status-select.st-baixado{background:#e1f5ee;color:#0f6e56;}
  select.status-select.st-recusado{background:#fcebeb;color:#a32d2d;}
  .row-recusado td{color:var(--muted);}
  .add-row{display:flex;gap:8px;margin-top:12px;}
  .add-row input, .add-row select{
    border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-size:13px;background:var(--card);
  }
  .add-row input[type=text]{flex:1;}
  button{
    border:1px solid var(--border);background:var(--card);border-radius:6px;
    padding:6px 12px;font-size:13px;cursor:pointer;color:var(--text);
  }
  button:hover{background:var(--bg);}
  .btn-add{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
  .btn-add:hover{background:#134a80;}
  .btn-import{background:#1a8f5a;border-color:#1a8f5a;color:#fff;font-weight:600;}
  .btn-import:hover{background:#146e46;}
  .reset{float:right;font-size:12px;color:var(--muted);cursor:pointer;}
  .loading{color:var(--muted);font-size:13px;}
  .empty{color:var(--muted);font-size:13px;padding:16px 0;text-align:center;}
  .error-box{background:#fcebeb;color:#a32d2d;border:1px solid #f0c6c6;border-radius:8px;padding:12px 14px;font-size:13px;margin-bottom:16px;}

  .today-card{display:flex;gap:24px;align-items:center;}
  .today-card .stat{display:flex;flex-direction:column;}
  .today-card .stat .n{font-size:26px;font-weight:700;}
  .today-card .stat.baixada .n{color:#0f6e56;}
  .today-card .stat.recusada .n{color:#a32d2d;}
  .today-card .stat .l{font-size:12px;color:var(--muted);}

  .today-grids{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .today-grid-panel h3{font-size:13px;font-weight:600;margin:0 0 8px;display:flex;align-items:center;gap:8px;}
  .today-grid-panel h3 .count{
    background:var(--purple-bg);color:var(--purple);font-size:11px;font-weight:700;
    padding:2px 8px;border-radius:12px;
  }
  .voltar-btn{
    border:1px solid var(--border);background:var(--card);border-radius:6px;
    padding:3px 8px;font-size:11px;cursor:pointer;color:var(--accent);
  }
  body.dark .voltar-btn:hover{background:#1c3550;}
  body.dark .theme-toggle:hover{background:#2a2b2f;}
  .voltar-btn:hover{background:#eef4fb;}

  .obs-icon{
    cursor:pointer;font-size:15px;background:none;border:none;padding:2px 4px;
    color:var(--muted);
  }
  .obs-icon:hover{color:var(--accent);}
  .obs-icon.has-note{color:var(--purple);}

  .modal-overlay{
    display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);
    align-items:center;justify-content:center;z-index:100;
  }
  .modal-overlay.open{display:flex;}
  .modal-box{
    background:var(--card);border:1px solid var(--border);border-radius:14px;
    padding:20px;width:480px;max-width:90vw;box-shadow:0 10px 30px rgba(0,0,0,0.2);
  }
  .modal-box h3{margin:0 0 4px;font-size:15px;}
  .modal-box .modal-sub{font-size:12px;color:var(--muted);margin:0 0 14px;}
  .modal-box textarea{
    width:100%;min-height:140px;border:1px solid var(--border);border-radius:8px;
    padding:10px;font-size:13px;font-family:inherit;background:var(--card);color:var(--text);
    resize:vertical;box-sizing:border-box;
  }
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:14px;}
  .modal-actions .btn-salvar{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}

  .hist-filters{display:flex;gap:10px;align-items:end;margin-bottom:20px;flex-wrap:wrap;}
  .hist-filters label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;}
  .hist-filters input, .hist-filters select{
    border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;background:var(--card);
  }
  .hist-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(240px,1fr));gap:14px;}
  .hist-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;}
  .hist-card .head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:14px;}
  .hist-card .name{font-weight:700;font-size:14px;line-height:1.3;}
  .hist-card .total-badge{
    background:var(--purple);color:#fff;font-size:12px;font-weight:700;
    padding:4px 12px;border-radius:20px;white-space:nowrap;
  }
  .hist-card .row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;color:var(--muted);}
  .hist-card .row b{color:var(--text);font-size:14px;}
</style>
</head>
<body>

<!-- ============================================================ -->
<script>
  const API_BASE_URL = "http://JNMDT076:3001/api"; // <-- endereço do computador rodando a API
</script>
<!-- ============================================================ -->

<h1>Progresso de correções</h1>
<p class="sub">Selecione o testador e marque os códigos conforme forem corrigidos.</p>
<p id="conn" class="conn">Verificando conexão com o servidor...</p>

<div class="topnav">

      </div>

        <label>Tipo</label>
        <select id="det-filtro">

          <option value="alteracao">Alteração</option>
        </select>
      </div>
      <div>
        <label>Data</label>
        <input type="date" id="det-data">
      </div>
      <div>
        <label>Situação</label>
        <select id="det-situacao-filtro">
          <option value="nenhum">Nenhum</option>
          <option value="Padrão">Padrão</option>
          <option value="Com Programador">Com Programador</option>
          <option value="Buildando Pipeline">Buildando Pipeline</option>
          <option value="Esperando Análise">Esperando Análise</option>
        </select>
      </div>
      <div>
        <button class="btn-filtrar" onclick="loadDetalhado()">Filtrar</button>
      </div>
    </div>
    <h2>Histórico Discriminado</h2>
    <table>
      <thead><tr><th>Data/Hora</th><th>Testador</th><th>Código</th><th>Tipo</th><th>Status</th><th>Situação</th><th>Observação</th></tr></thead>
      <tbody id="det-body"></tbody>
    </table>
  </div>
</div>

<script>
const TESTERS = [
  "Moretti", "Balduino", "Marcio", "Carol", "Amanda",
  "Zanuto", "Matheus Estrella", "Mateus Cavalcante", "Guilherme", "Gabriel Adati"
];

let currentTester = TESTERS[0];
let items = [];
let barChart = null;
let currentView = 'painel';
let progressMode = localStorage.getItem('modoProgresso') || 'baixado'; // 'baixado' | 'baixado_recusado'

function applyTheme(){
  const dark = localStorage.getItem('temaEscuro') === '1';
  document.body.classList.toggle('dark', dark);
  const btn = document.getElementById('theme-toggle');
  if(btn) btn.textContent = dark ? '☀️ Modo claro' : '🌙 Modo escuro';
}
function toggleTheme(){
  const isDark = document.body.classList.contains('dark');
  localStorage.setItem('temaEscuro', isDark ? '0' : '1');
  applyTheme();
  render();
}

function todayStr(){
  const d = new Date();
  const p = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}

async function checkConnection(){
  const el = document.getElementById('conn');
  try{
    const res = await fetch(`${API_BASE_URL}/health`);
    const data = await res.json();
    if(data.ok){
      el.textContent = "Conectado ao banco de dados";
      el.className = "conn ok";
      return true;
    }
    throw new Error(data.error || 'falha desconhecida');
  }catch(e){
    el.textContent = `Não foi possível conectar à API (${API_BASE_URL}). Verifique se o servidor está rodando e o endereço está correto.`;
    el.className = "conn fail";
    return false;
  }
}

function switchView(view){
  currentView = view;
  document.getElementById('nav-painel').classList.toggle('active', view==='painel');
  document.getElementById('nav-historico').classList.toggle('active', view==='historico');
  document.getElementById('nav-detalhado').classList.toggle('active', view==='detalhado');
  document.getElementById('view-painel').style.display = view==='painel' ? 'block' : 'none';
  document.getElementById('view-historico').style.display = view==='historico' ? 'block' : 'none';
  document.getElementById('view-detalhado').style.display = view==='detalhado' ? 'block' : 'none';
  if(view==='historico') initHistorico();
  if(view==='detalhado') initDetalhado();
}

/* ---------------- PAINEL ---------------- */

function renderTabs(){
  document.getElementById('tabs').innerHTML = TESTERS.map(t => `
    <button class="tab-btn ${t===currentTester?'active':''}" onclick="switchTester('${t.replace(/'/g,"\\'")}')">${t}</button>
  `).join('');
}

async function switchTester(name){
  currentTester = name;
  renderTabs();
  document.getElementById('app').innerHTML = '<p class="loading">Carregando...</p>';
  await loadItems();
}

async function loadItems(){
  try{
    const res = await fetch(`${API_BASE_URL}/items?testador=${encodeURIComponent(currentTester)}`);
    if(!res.ok) throw new Error('Erro ao carregar dados');
    const raw = await res.json();
    items = raw.map(i => ({
      id: i.id, codigo: i.codigo, tipo: i.tipo, modulo: i.modulo, cliente: i.cliente,
      status: i.status, statusAt: i.status_em
    }));
    await loadTodayGrids();
    render();
  }catch(e){
    document.getElementById('app').innerHTML = `<div class="error-box">Não foi possível carregar os dados do servidor. ${e.message}</div>`;
  }
}

let baixadosHoje = [];
let recusadosHoje = [];
let resumoHoje = { porTipo: [], totalBaixados: 0, totalRecusados: 0 };
async function loadTodayGrids(){
  try{
    const [resB, resR, resResumo] = await Promise.all([
      fetch(`${API_BASE_URL}/items/hoje?testador=${encodeURIComponent(currentTester)}&status=baixado`),
      fetch(`${API_BASE_URL}/items/hoje?testador=${encodeURIComponent(currentTester)}&status=recusado`),
      fetch(`${API_BASE_URL}/historico/resumo?data=${todayStr()}&testador=${encodeURIComponent(currentTester)}`)
    ]);
    baixadosHoje = resB.ok ? await resB.json() : [];
    recusadosHoje = resR.ok ? await resR.json() : [];
    resumoHoje = resResumo.ok ? await resResumo.json() : { porTipo: [], totalBaixados: 0, totalRecusados: 0 };
  }catch(e){
    baixadosHoje = [];
    recusadosHoje = [];
    resumoHoje = { porTipo: [], totalBaixados: 0, totalRecusados: 0 };
  }
}

async function desfazerBaixa(id){
  if(!confirm('Desfazer esta baixa? Ela vai voltar pra fila e sair do relatório de hoje.')) return;
  try{
    const res = await fetch(`${API_BASE_URL}/items/${id}/desfazer-baixa`, { method: 'POST' });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error || 'Falha ao desfazer');
    await loadItems();
  }catch(e){
    alert('Erro ao desfazer baixa: ' + e.message);
  }
}

async function setStatus(id, status){
  try{
    const res = await fetch(`${API_BASE_URL}/items/${id}`, {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({status})
    });
    if(!res.ok) throw new Error('Falha ao atualizar status');
    await loadItems();
  }catch(e){
    alert('Erro ao atualizar status: ' + e.message);
  }
}

async function removeItem(id){
  if(!confirm('Remover esta atividade?')) return;
  try{
    const res = await fetch(`${API_BASE_URL}/items/${id}`, { method: 'DELETE' });
    if(!res.ok) throw new Error('Falha ao remover');
    await loadItems();
  }catch(e){
    alert('Erro ao remover: ' + e.message);
  }
}

async function addItem(){
  const codigo = document.getElementById('new-codigo').value.trim();
  const tipo = document.getElementById('new-tipo').value;
  const modulo = document.getElementById('new-modulo').value.trim();
  const cliente = document.getElementById('new-cliente').value.trim();
  if(!codigo) return;
  try{
    const res = await fetch(`${API_BASE_URL}/items`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ testador: currentTester, codigo, tipo, modulo, cliente })
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error || 'Falha ao adicionar');
    document.getElementById('new-codigo').value = '';
    document.getElementById('new-modulo').value = '';
    document.getElementById('new-cliente').value = '';
    await loadItems();
  }catch(e){
    alert('Erro ao adicionar: ' + e.message);
  }
}

function normalizeHeader(s){
  return String(s ?? '')
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .toLowerCase().trim();
}

let modalObsContexto = null; // { tipo: 'item'|'historico', id }
let ultimoDetalhadoRows = [];

function abrirModalObsItem(id){
  const it = items.find(i => i.id === id);
  if(!it) return;
  abrirModalObs('item', id, it.observacao || '', it.codigo);
}

function abrirModalObsHistorico(id){
  const r = ultimoDetalhadoRows.find(r => r.id === id);
  if(!r) return;
  abrirModalObs('historico', id, r.observacao || '', r.codigo);
}

function abrirModalObs(tipo, id, valorAtual, codigo){
  modalObsContexto = { tipo, id };
  document.getElementById('obs-modal-titulo').textContent = 'Observação';
  document.getElementById('obs-modal-sub').textContent = codigo ? `Atividade ${codigo}` : '';
  document.getElementById('obs-modal-texto').value = valorAtual || '';
  document.getElementById('obs-modal').classList.add('open');
  setTimeout(() => document.getElementById('obs-modal-texto').focus(), 50);
}

function fecharModalObs(){
  document.getElementById('obs-modal').classList.remove('open');
  modalObsContexto = null;
}

async function salvarModalObs(){
  if(!modalObsContexto) return;
  const valor = document.getElementById('obs-modal-texto').value;
  const { tipo, id } = modalObsContexto;

  try{
    let url, body;
    if(tipo === 'item'){
      url = `${API_BASE_URL}/items/${id}/observacao`;
      body = { observacao: valor };
    } else {
      url = `${API_BASE_URL}/historico/${id}`;
      body = { observacao: valor };
    }
    const res = await fetch(url, {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    if(!res.ok) throw new Error('Falha ao salvar');

    fecharModalObs();
    if(tipo === 'item'){
      await loadItems();
    } else {
      await loadDetalhado();
    }
  }catch(e){
    alert('Erro ao salvar observação: ' + e.message);
  }
}

document.addEventListener('keydown', (e) => {
  if(e.key === 'Escape' && document.getElementById('obs-modal').classList.contains('open')){
    fecharModalObs();
  }
});

async function importExcel(event){
  const file = event.target.files[0];
  if(!file) return;
  const statusEl = document.getElementById('import-status');
  statusEl.textContent = 'Lendo arquivo...';

  try{
    const buffer = await file.arrayBuffer();
    const workbook = XLSX.read(buffer, { type: 'array' });
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const aoa = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false, defval: '' });

    // Procura a linha de cabeçalho (a que tem uma célula "Código")
    let headerRowIdx = -1;
    let colMap = {};
    for(let r = 0; r < Math.min(aoa.length, 30); r++){
      const norm = aoa[r].map(normalizeHeader);
      if(norm.includes('codigo')){
        headerRowIdx = r;
        norm.forEach((h, i) => { if(h) colMap[h] = i; });
        break;
      }
    }

    if(headerRowIdx === -1){
      statusEl.textContent = 'Não encontrei uma coluna "Código" no arquivo. Verifique o formato da planilha.';
      event.target.value = '';
      return;
    }

    const idxCodigo = colMap['codigo'];
    const idxTipo = colMap['tipo'];
    const idxModulo = colMap['modulo'];
    const idxCliente = colMap['nome do cliente'] !== undefined ? colMap['nome do cliente'] : colMap['cliente'];

    const dataRows = aoa.slice(headerRowIdx + 1).filter(row => String(row[idxCodigo] ?? '').trim() !== '');

    if(!dataRows.length){
      statusEl.textContent = 'Nenhuma linha de dados encontrada abaixo do cabeçalho.';
      event.target.value = '';
      return;
    }

    let sucesso = 0, duplicados = 0, erros = 0;
    statusEl.textContent = `Importando 0/${dataRows.length}...`;

    for(let i=0; i<dataRows.length; i++){
      const row = dataRows[i];
      const codigo = String(row[idxCodigo] ?? '').trim();
      const tipo = (idxTipo !== undefined ? String(row[idxTipo] ?? '').trim() : '') || 'Correção';
      const modulo = idxModulo !== undefined ? String(row[idxModulo] ?? '').trim() : '';
      const cliente = idxCliente !== undefined ? String(row[idxCliente] ?? '').trim() : '';

      if(!codigo){ continue; }

      try{
        const res = await fetch(`${API_BASE_URL}/items`, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ testador: currentTester, codigo, tipo, modulo, cliente })
        });
        if(res.status === 409){
          duplicados++;
        } else if(!res.ok){
          erros++;
        } else {
          sucesso++;
        }
      }catch(e){
        erros++;
      }
      statusEl.textContent = `Importando ${i+1}/${dataRows.length}...`;
    }

    statusEl.textContent = `Importação concluída: ${sucesso} adicionadas, ${duplicados} já existiam, ${erros} com erro.`;
    event.target.value = '';
    await loadItems();
  }catch(e){
    statusEl.textContent = 'Erro ao ler o arquivo: ' + e.message;
    event.target.value = '';
  }
}

function makeGradient(ctx, chartArea, colorTop, colorBottom){
  const gradient = ctx.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
  gradient.addColorStop(0, colorTop);
  gradient.addColorStop(1, colorBottom);
  return gradient;
}

function toggleProgressMenu(ev){
  ev.stopPropagation();
  const menu = document.getElementById('progress-menu');
  menu.classList.toggle('open');
}
function setProgressMode(mode){
  progressMode = mode;
  localStorage.setItem('modoProgresso', mode);
  render();
}
document.addEventListener('click', () => {
  const menu = document.getElementById('progress-menu');
  if(menu) menu.classList.remove('open');
});

function render(){
  // Fila principal: só o que ainda está em aberto (recusado e baixado saem pra suas grades)
  const fila = items.filter(i => i.status === 'pendente' || i.status === 'testando');

  const pendentes = fila.filter(i=>i.status==='pendente').length;
  const testando = fila.filter(i=>i.status==='testando').length;
  const baixadosCount = resumoHoje.totalBaixados;   // baseado no histórico (não some se voltar pra fila)
  const recusadosCount = resumoHoje.totalRecusados; // baseado no histórico (não some se voltar pra fila)
  const total = pendentes + testando + baixadosCount + recusadosCount;

  const numerador = progressMode === 'baixado_recusado' ? (baixadosCount + recusadosCount) : baixadosCount;
  const pct = total ? Math.round((numerador/total)*100) : 0;

  const rowsHtml = fila.length ? fila.map(it=>`
    <tr class="row-${it.status}">
      <td>${it.codigo}</td>
      <td><span class="badge" style="${it.tipo==='Alteração' ? 'background:var(--alt-pend-bg);color:var(--alt-pend);' : 'background:#e6f1fb;color:#0c447c;'}">${it.tipo}</span></td>
      <td>${it.modulo || '-'}</td>
      <td>${it.cliente || '-'}</td>
      <td>
        <select class="status-select st-${it.status}" onchange="setStatus(${it.id}, this.value)">
          <option value="pendente" ${it.status==='pendente'?'selected':''}>Pendente</option>
          <option value="testando" ${it.status==='testando'?'selected':''}>Testando</option>
          <option value="baixado" ${it.status==='baixado'?'selected':''}>Baixado</option>
          <option value="recusado" ${it.status==='recusado'?'selected':''}>Recusado</option>
        </select>
      </td>
      <td>
        <button class="obs-icon ${it.observacao ? 'has-note' : ''}" title="${it.observacao ? 'Ver/editar anotação' : 'Adicionar anotação'}"
                onclick="abrirModalObsItem(${it.id})">📝</button>
      </td>
      <td><span class="reset" onclick="removeItem(${it.id})">remover</span></td>
    </tr>
  `).join('') : '';

  const baixadosRows = baixadosHoje.length ? baixadosHoje.map(it => `
    <tr>
      <td>${it.codigo}</td>
      <td>${it.modulo || '-'}</td>
      <td>${it.cliente || '-'}</td>
      <td><button class="voltar-btn" onclick="desfazerBaixa(${it.id})" title="Use se baixou sem querer — remove do relatório de hoje">Voltar para Fila</button></td>
    </tr>
  `).join('') : `<tr><td colspan="4" class="empty">Nada baixado hoje ainda.</td></tr>`;

  const recusadosRows = recusadosHoje.length ? recusadosHoje.map(it => `
    <tr>
      <td>${it.codigo}</td>
      <td>${it.modulo || '-'}</td>
      <td>${it.cliente || '-'}</td>
      <td><button class="voltar-btn" onclick="setStatus(${it.id}, 'pendente')">Voltar para Fila</button></td>
    </tr>
  `).join('') : `<tr><td colspan="4" class="empty">Nada recusado hoje ainda.</td></tr>`;

  document.getElementById('app').innerHTML = `
    <div class="cards">
      <div class="metric"><div class="label">Total (hoje)</div><div class="value">${total}</div></div>
      <div class="metric"><div class="label">Baixados (hoje)</div><div class="value">${baixadosCount}</div></div>
      <div class="metric"><div class="label">Recusados (hoje)</div><div class="value">${recusadosCount}</div></div>
      <div class="metric"><div class="label">Testando</div><div class="value">${testando}</div></div>
      <div class="metric"><div class="label">Pendentes</div><div class="value">${pendentes}</div></div>
      <div class="metric clickable" onclick="toggleProgressMenu(event)">
        <div class="label">Progresso ▾</div>
        <div class="value">${pct}%</div>
        <div id="progress-menu" class="progress-menu">
          <div class="opt ${progressMode==='baixado'?'selected':''}" onclick="setProgressMode('baixado')">Somente Baixado conta</div>
          <div class="opt ${progressMode==='baixado_recusado'?'selected':''}" onclick="setProgressMode('baixado_recusado')">Baixado + Recusado conta</div>
        </div>
      </div>
    </div>

    <div class="panel">
      <h2>Quantidades por tipo — ${currentTester} (hoje)</h2>
      <canvas id="barChart"></canvas>
    </div>

    <div class="panel">
      <h2>Fila de ${currentTester}</h2>
      ${fila.length ? `
      <table>
        <thead><tr><th>Código</th><th>Tipo</th><th>Módulo</th><th>Cliente</th><th>Status</th><th></th><th></th></tr></thead>
        <tbody>${rowsHtml}</tbody>
      </table>` : '<p class="empty">Nenhuma atividade pendente. Adicione um código abaixo.</p>'}
      <div class="add-row">
        <input type="text" id="new-codigo" placeholder="Código">
        <select id="new-tipo"><option>Correção</option><option>Alteração</option></select>
        <input type="text" id="new-modulo" placeholder="Módulo" style="width:100px;">
        <input type="text" id="new-cliente" placeholder="Cliente">
        <button class="btn-add" onclick="addItem()">Adicionar</button>
        <button class="btn-import" onclick="document.getElementById('excel-input').click()">Importar Excel</button>
        <input type="file" id="excel-input" accept=".xlsx,.xls,.ods" style="display:none;" onchange="importExcel(event)">
      </div>
      <p id="import-status" style="font-size:12px;color:var(--muted);margin:8px 0 0;"></p>
    </div>

    <div class="panel">
      <h2>Atividades de hoje — ${currentTester}</h2>
      <p style="font-size:12px;color:var(--muted);margin:-6px 0 12px;">
        Os cartões de Baixados/Recusados (hoje) e o Progresso contam toda recusa/baixa do dia, mesmo que a atividade já tenha voltado pra fila pra ser retestada. As grades abaixo mostram só o que está com esse status agora.
      </p>
      <div class="today-grids">
        <div class="today-grid-panel">
          <h3>Baixados hoje <span class="count">${baixadosHoje.length}</span></h3>
          <table>
            <thead><tr><th>Código</th><th>Módulo</th><th>Cliente</th><th></th></tr></thead>
            <tbody>${baixadosRows}</tbody>
          </table>
        </div>
        <div class="today-grid-panel">
          <h3>Recusados hoje <span class="count">${recusadosHoje.length}</span></h3>
          <table>
            <thead><tr><th>Código</th><th>Módulo</th><th>Cliente</th><th></th></tr></thead>
            <tbody>${recusadosRows}</tbody>
          </table>
        </div>
      </div>
    </div>
  `;

  const tipos = [...new Set([...fila, ...baixadosHoje, ...recusadosHoje, ...resumoHoje.porTipo.map(r=>({tipo:r.tipo}))].map(i=>i.tipo))];
  const barCtx = document.getElementById('barChart');
  if(barChart) barChart.destroy();
  if(tipos.length === 0) return;

  const resumoPorTipo = tipo => resumoHoje.porTipo.find(r => r.tipo === tipo) || { baixados: 0, recusados: 0 };
  const baixadoByTipo = tipos.map(t => resumoPorTipo(t).baixados);
  const recusadoByTipo = tipos.map(t => resumoPorTipo(t).recusados);
  const testandoByTipo = tipos.map(t=>fila.filter(i=>i.tipo===t && i.status==='testando').length);
  const pendenteByTipo = tipos.map(t=>fila.filter(i=>i.tipo===t && i.status==='pendente').length);

  const isDark = document.body.classList.contains('dark');
  const gridColor = isDark ? '#2c2d31' : '#f0eee6';

  barChart = new Chart(barCtx, {
    type:'bar',
    data:{
      labels: tipos,
      datasets:[
        { label:'Baixado', data: baixadoByTipo, borderRadius:8,
          backgroundColor: (c)=> c.chart.chartArea ? makeGradient(c.chart.ctx, c.chart.chartArea, '#7fdcb8', '#0f6e56') : '#5dcaa5' },
        { label:'Recusado', data: recusadoByTipo, borderRadius:8,
          backgroundColor: (c)=> c.chart.chartArea ? makeGradient(c.chart.ctx, c.chart.chartArea, '#f3b3b3', '#a32d2d') : '#e24b4a' },
        { label:'Testando', data: testandoByTipo, borderRadius:8,
          backgroundColor: (c)=> c.chart.chartArea ? makeGradient(c.chart.ctx, c.chart.chartArea, '#f5dd8f', '#8a6d0a') : '#e0c34a' },
        { label:'Pendente', data: pendenteByTipo, borderRadius:8,
          backgroundColor: (c)=> c.chart.chartArea ? makeGradient(c.chart.ctx, c.chart.chartArea, '#d3d1c7', '#5f5e5a') : '#b4b2a9' }
      ]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{ legend:{ position:'bottom', labels:{ boxWidth:12, padding:16, color: isDark ? '#eceae5' : '#22201b' } } },
      scales:{
        y:{ beginAtZero:true, ticks:{ stepSize:1, precision:0, color: isDark ? '#9a978f' : '#75726a' }, grid:{ color: gridColor } },
        x:{ grid:{ display:false }, ticks:{ color: isDark ? '#9a978f' : '#75726a' } }
      }
    }
  });
}

/* ---------------- HISTÓRICO ---------------- */

function initHistorico(){
  const dataInput = document.getElementById('hist-data');
  if(!dataInput.value) dataInput.value = todayStr();

  const sel = document.getElementById('hist-testador');
  if(!sel.dataset.filled){
    sel.innerHTML = `<option value="Todos">Todos os testadores</option>` +
      TESTERS.map(t => `<option value="${t}">${t}</option>`).join('');
    sel.dataset.filled = '1';
  }
  loadHistorico();
}

async function loadHistorico(){
  const dataEscolhida = document.getElementById('hist-data').value || todayStr();
  const testador = document.getElementById('hist-testador').value || 'Todos';
  const grid = document.getElementById('hist-grid');
  const title = document.getElementById('hist-title');

  const [y,m,d] = dataEscolhida.split('-');
  title.textContent = `Correções validadas por QA (${d}/${m}/${y})`;

  grid.innerHTML = '<p class="loading">Carregando...</p>';

  try{
    const res = await fetch(`${API_BASE_URL}/historico?dataInicio=${dataEscolhida}&dataFim=${dataEscolhida}&testador=${encodeURIComponent(testador)}`);
    if(!res.ok) throw new Error('Erro ao carregar histórico');
    const rows = await res.json();

    if(!rows.length){
      grid.innerHTML = '<p class="empty">Nenhuma baixa ou recusa registrada nessa data.</p>';
      return;
    }

    grid.innerHTML = rows.map(r => `
      <div class="hist-card">
        <div class="head">
          <div class="name">${r.testador}</div>
          <div class="total-badge">Total ${r.baixadas + r.recusas}</div>
        </div>
        <div class="row"><span>Baixada</span><b>${r.baixadas}</b></div>
        <div class="row"><span>Recusa</span><b>${r.recusas}</b></div>
      </div>
    `).join('');
  }catch(e){
    grid.innerHTML = `<div class="error-box">${e.message}</div>`;
  }
}

/* ---------------- HISTÓRICO DISCRIMINADO ---------------- */

function initDetalhado(){
  const sel = document.getElementById('det-testador');
  if(!sel.dataset.filled){
    sel.innerHTML = `<option value="Todos">Todos os testadores</option>` +
      TESTERS.map(t => `<option value="${t}">${t}</option>`).join('');
    sel.dataset.filled = '1';
  }
  const dataInput = document.getElementById('det-data');
  if(!dataInput.value) dataInput.value = todayStr();

  loadDetalhado();
}

function primeiroDiaDoMes(){
  const d = new Date();
  const p = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-01`;
}

function ultimoDiaDoMes(){
  const d = new Date();
  const ultimo = new Date(d.getFullYear(), d.getMonth()+1, 0);
  const p = n => String(n).padStart(2,'0');
  return `${ultimo.getFullYear()}-${p(ultimo.getMonth()+1)}-${p(ultimo.getDate())}`;
}

function formatDataHora(iso){
  if(!iso) return '-';
  const d = new Date(iso);
  const p = n => String(n).padStart(2,'0');
  return `${p(d.getDate())}/${p(d.getMonth()+1)}/${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

const SITUACOES = [
  { valor: 'Padrão', classe: 'sit-padrao' },
  { valor: 'Com Programador', classe: 'sit-comprogramador' },
  { valor: 'Buildando Pipeline', classe: 'sit-buildando' },
  { valor: 'Esperando Análise', classe: 'sit-esperando' }
];
function classeSituacao(valor){
  const s = SITUACOES.find(s => s.valor === valor);
  return s ? s.classe : 'sit-padrao';
}

async function loadDetalhado(){
  const testador = document.getElementById('det-testador').value || 'Todos';
  const filtro = document.getElementById('det-filtro').value || 'todas';
  const dataEscolhida = document.getElementById('det-data').value || todayStr();
  const situacaoFiltro = document.getElementById('det-situacao-filtro').value || 'nenhum';

  const body = document.getElementById('det-body');
  body.innerHTML = `<tr><td colspan="7" class="loading">Carregando...</td></tr>`;

  // Filtrando por Situação: ignora a data, considera só testador/tipo/situação
  let url = `${API_BASE_URL}/historico/detalhado?testador=${encodeURIComponent(testador)}&filtro=${filtro}`;
  if(situacaoFiltro !== 'nenhum'){
    url += `&situacao=${encodeURIComponent(situacaoFiltro)}`;
  } else {
    url += `&dataInicio=${dataEscolhida}&dataFim=${dataEscolhida}`;
  }

  try{
    const res = await fetch(url);
    if(!res.ok) throw new Error('Erro ao carregar histórico');
    const rows = await res.json();
    ultimoDetalhadoRows = rows;

    if(!rows.length){
      body.innerHTML = `<tr><td colspan="7" class="empty">Nenhum registro encontrado.</td></tr>`;
      return;
    }

    body.innerHTML = rows.map(r => `
      <tr>
        <td>${formatDataHora(r.registrado_em)}</td>
        <td>${r.testador}</td>
        <td>${r.codigo}</td>
        <td><span class="badge" style="${r.tipo==='Alteração' ? 'background:var(--alt-pend-bg);color:var(--alt-pend);' : 'background:#e6f1fb;color:#0c447c;'}">${r.tipo || '-'}</span></td>
        <td><span class="status-select st-${r.status}" style="display:inline-block;padding:4px 6px;border-radius:6px;">${r.status === 'baixado' ? 'Baixado' : 'Recusado'}</span></td>
        <td>
          <select class="situacao-select ${classeSituacao(r.situacao)}" onchange="salvarSituacao(${r.id}, this.value, this)">
            ${SITUACOES.map(s => `<option value="${s.valor}" ${r.situacao===s.valor?'selected':''}>${s.valor}</option>`).join('')}
          </select>
        </td>
        <td>
          <button class="obs-icon ${r.observacao ? 'has-note' : ''}" title="${r.observacao ? 'Ver/editar observação' : 'Adicionar observação'}"
                  onclick="abrirModalObsHistorico(${r.id})">📝 ${r.observacao ? 'Ver' : 'Adicionar'}</button>
        </td>
      </tr>
    `).join('');
  }catch(e){
    body.innerHTML = `<tr><td colspan="7"><div class="error-box">${e.message}</div></td></tr>`;
  }
}

async function salvarSituacao(id, valor, selectEl){
  try{
    const res = await fetch(`${API_BASE_URL}/historico/${id}`, {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ situacao: valor })
    });
    if(!res.ok) throw new Error('Falha ao salvar');
    selectEl.className = `situacao-select ${classeSituacao(valor)}`;
  }catch(e){
    alert('Erro ao salvar situação: ' + e.message);
  }
}

async function salvarObservacao(id, valor, inputEl){
  const originalBorder = inputEl.style.borderColor;
  try{
    const res = await fetch(`${API_BASE_URL}/historico/${id}`, {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ observacao: valor })
    });
    if(!res.ok) throw new Error('Falha ao salvar');
    inputEl.style.borderColor = '#0f6e56';
    inputEl.blur();
    setTimeout(() => { inputEl.style.borderColor = originalBorder; }, 1200);
  }catch(e){
    inputEl.style.borderColor = '#a32d2d';
    alert('Erro ao salvar observação: ' + e.message);
  }
}

/* ---------------- INIT ---------------- */

(async function init(){
  applyTheme();
  renderTabs();
  await checkConnection();
  await loadItems();
})();
</script>

    <div class="modal-actions">
